# Rate limiting — protège l'API contre les abus
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=5r/m;

server {
    listen 80;
    server_name allihtech.com www.allihtech.com _;
    root /usr/share/nginx/html;
    index index.html;

    # ── En-têtes de sécurité ───────────────────────────────────────────────────
    add_header X-Frame-Options                   "DENY"                                       always;
    add_header X-Content-Type-Options            "nosniff"                                    always;
    add_header X-XSS-Protection                  "1; mode=block"                              always;
    add_header Referrer-Policy                   "strict-origin-when-cross-origin"            always;
    add_header Permissions-Policy                "camera=(), microphone=(), geolocation=()"   always;
    add_header Strict-Transport-Security         "max-age=63072000; includeSubDomains; preload" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src 'self' 'unsafe-inline';
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src 'self' https://fonts.gstatic.com;
         img-src 'self' data: https:;
         connect-src 'self' https://allihtech-api.onrender.com https://api.allihtech.com;
         frame-ancestors 'none';
         base-uri 'self';
         form-action 'self';"
        always;

    # ── Compression gzip ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css application/json application/javascript
        text/xml application/xml image/svg+xml text/javascript
        application/wasm application/manifest+json;

    # ── SPA — React Router ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        # Pas de cache sur index.html (le SPA entry point)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── API proxy vers Django ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
        proxy_connect_timeout 30;
    }

    # Rate limit renforcé sur le formulaire de contact
    location /api/contact/ {
        limit_req zone=contact_limit burst=3 nodelay;
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Django Admin ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass       http://backend:8000;
        proxy_set_header Host      $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Fichiers statiques Django ─────────────────────────────────────────────
    location /static/ {
        proxy_pass http://backend:8000;
    }

    # ── Cache long terme pour assets versionnés ───────────────────────────────
    location ~* \.(js|css|woff|woff2|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 6M;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Masquer la version nginx ──────────────────────────────────────────────
    server_tokens off;
}
