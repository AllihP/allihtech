version: '3.9'

# Development overrides — hot reload, debug toolbar
services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    env_file: backend/.env
    environment:
      - DJANGO_SETTINGS_MODULE=allihtech.settings.development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    networks: [app-network]

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    networks: [app-network]

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: allihtech_db
      POSTGRES_USER: allihtech
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    networks: [app-network]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks: [app-network]

networks:
  app-network:
    driver: bridge
