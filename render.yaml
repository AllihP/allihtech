# ═══════════════════════════════════════════════════════════════════════════════
# Render Blueprint — allihtech.com
# Déploie : Backend Django · Frontend React · PostgreSQL · Redis
#
# UTILISATION :
#   1. Connecter ce dépôt à Render (render.com/blueprints)
#   2. Définir manuellement dans Render Dashboard :
#        EMAIL_HOST_USER, EMAIL_HOST_PASSWORD, CONTACT_EMAIL_RECIPIENT, SENTRY_DSN
#   3. Pointer le domaine allihtech.com → allihtech-frontend (Settings > Custom Domain)
#   4. Pointer api.allihtech.com → allihtech-api (optionnel — améliore le SEO)
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ── Backend Django API ──────────────────────────────────────────────────────
  - type: web
    name: allihtech-api
    env: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: >-
      pip install -r requirements/production.txt &&
      python manage.py collectstatic --noinput
    startCommand: >-
      python manage.py migrate --noinput &&
      gunicorn allihtech.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers 2
      --worker-class gevent
      --timeout 120
      --log-level warning
      --access-logfile -
    healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: DJANGO_SETTINGS_MODULE
        value: allihtech.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: allihtech-api.onrender.com,allihtech.com,www.allihtech.com,api.allihtech.com
      - key: DATABASE_URL
        sync: false   # Coller l'URL Neon : postgresql://user:pass@host/db?sslmode=require
      - key: REDIS_URL
        fromService:
          type: redis
          name: allihtech-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: https://allihtech.com,https://www.allihtech.com,https://allihtech-frontend.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://allihtech.com,https://www.allihtech.com,https://allihtech-api.onrender.com
      - key: FRONTEND_URL
        value: https://allihtech.com
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      # Définir manuellement dans le dashboard Render :
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: CONTACT_EMAIL_RECIPIENT
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Frontend React (Static Site) ───────────────────────────────────────────
  - type: web
    name: allihtech-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    # Fallback SPA — toutes les routes renvoient index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    # En-têtes de sécurité (complètent ceux de nginx en Docker)
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: camera=(), microphone=(), geolocation=()
      - path: /*
        name: Strict-Transport-Security
        value: max-age=63072000; includeSubDomains; preload
      # Cache longue durée pour assets versionnés par Vite (hash dans le nom)
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      # URL complète du backend API (injectée au build par Vite)
      - key: VITE_API_URL
        value: https://allihtech-api.onrender.com/api

  # ── Redis Cache ─────────────────────────────────────────────────────────────
  - type: redis
    name: allihtech-redis
    plan: free
    region: frankfurt
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []          # Accès uniquement depuis les services internes

# Base de données gérée sur Neon (neon.tech) — DATABASE_URL défini manuellement ci-dessus
